<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ABC Engineering College | B.Tech Admissions 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f4f6f9;
            color: #333;
        }

        header {
            background: #0b3d91;
            color: white;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 22px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .hero {
            background: linear-gradient(rgba(11,61,145,0.8), rgba(11,61,145,0.8)),
                        url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        .hero h2 {
            font-size: 42px;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 25px;
        }

        .btn {
            background: #ffcc00;
            color: #000;
            padding: 12px 25px;
            text-decoration: none;
            font-weight: 600;
            border-radius: 5px;
        }

        .btn:hover {
            background: #ffaa00;
        }

        .form-section {
            max-width: 800px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .form-section h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #0b3d91;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        form input,
        form select,
        form textarea {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 100%;
        }

        form textarea {
            grid-column: span 2;
            resize: none;
        }

        .full-width {
            grid-column: span 2;
        }

        button {
            background: #0b3d91;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #072a63;
        }

        .success-message {
            text-align: center;
            color: green;
            margin-top: 20px;
            font-weight: 600;
        }

        footer {
            background: #0b3d91;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }

        @media(max-width: 768px) {
            form {
                grid-template-columns: 1fr;
            }

            .full-width {
                grid-column: span 1;
            }

            header {
                flex-direction: column;
            }

            nav {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>ABC Engineering College</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Courses</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>B.Tech Admissions 2026 Open</h2>
    <p>Shape your future with world-class engineering education.</p>
    <a href="#admission" class="btn">Apply Now</a>
</section>

<section id="admission" class="form-section">
    <h2>Student Admission Form</h2>

    <form id="admissionForm">

        <input type="text" placeholder="Full Name" required>
        <input type="date" required>

        <input type="email" placeholder="Email Address" required>
        <input type="tel" placeholder="Phone Number" required>

        <input type="text" placeholder="Father's Name" required>
        <input type="text" placeholder="Mother's Name" required>

        <input type="text" placeholder="12th Percentage / CGPA" required>

        <select required>
            <option value="">Select Course</option>
            <option>Computer Science Engineering</option>
            <option>Electronics & Communication</option>
            <option>Mechanical Engineering</option>
            <option>Civil Engineering</option>
        </select>

        <textarea rows="4" placeholder="Permanent Address" required></textarea>

        <button type="submit" class="full-width">Submit Application</button>

    </form>

    <div class="success-message" id="successMessage"></div>

</section>

<footer>
    © 2026 ABC Engineering College | All Rights Reserved
</footer>

<script>
    document.getElementById("admissionForm").addEventListener("submit", function(e) {
        e.preventDefault();

        document.getElementById("successMessage").innerText =
            "Your application has been submitted successfully! We will contact you soon.";

        this.reset();
    });
</script>

</body>
</html>
